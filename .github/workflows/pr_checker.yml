name: SOPTKATON Android Develop CI

on:
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    name: PR Checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: |
          echo "base.url=\"https://temp.com\"" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Restore debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            mkdir -p ./keystore
            echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > ./keystore/debug-key.jks
          else
            echo "DEBUG_KEYSTORE_BASE64 not found."
          fi

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "${GOOGLE_SERVICES_JSON}" > ./app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON not found."
          fi

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest
